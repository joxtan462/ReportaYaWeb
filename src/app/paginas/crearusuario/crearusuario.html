<header class="navbar">
  <div class="navbar-left">
    <img src="assets/logo.png" alt="Logo" class="logo">
    <a class="app-name" routerLink="/menu">ReportaYa</a>
  </div>
  <div class="usuario">Usuario: #######</div>
</header>

<main class="form-container">
  <div class="user-card">
    <h1 class="form-title">Crear Usuario</h1>

    <form (ngSubmit)="crearUsuario(usuarioForm)" #usuarioForm="ngForm" class="user-form">
      <div class="form-group">
        <label for="nombre">Nombre de Usuario</label>
        <input type="text" id="nombre" name="nombre" ngModel required placeholder="Ingrese el nombre">
      </div>

      <div class="form-group">
        <label for="correo">Correo Electrónico</label>
        <input type="email" id="correo" name="correo" ngModel required placeholder="ejemplo@correo.com">
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" ngModel required placeholder="********">
      </div>

      <div class="form-group">
        <label for="rango">Rango</label>
        <select id="rango" name="rango" ngModel required>
          <option value="" disabled selected>Seleccione un rango</option>
          <option value="camaras">Vista Cámaras</option>
          <option value="multas">Multas / Partes</option>
          <option value="admin">Administrador</option>
          <option value="inspector">Inspector</option> 
        </select>
      </div>

      <button type="submit" [disabled]="!usuarioForm.valid" class="submit-btn">
        Crear Usuario
      </button>
    </form>
  </div>
</main>
